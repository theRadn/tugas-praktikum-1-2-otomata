<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FSM Checker</title>
  <link rel="stylesheet" href="P2.css">
</head>
<body>

<div class="wrapper">
    <header>
        <nav class="navbar">
            <a href="../index.html" class="nav-link">Lexer</a>
            <a href="#" class="nav-link active">FSM Checker</a>
        </nav>
        <h1>FSM Checker</h1>
    </header>

    <div class="container">

    <!-- LEFT PANEL -->
    <div class="panel left">
        <h2>Input String</h2>
        <input type="text" id="inputString" placeholder="Masukkan string 0 dan 1">
        <button onclick="checkString()">Check String</button>
        <button onclick="resetAll()" class="reset">Reset</button>
    </div>

    <!-- CENTER PANEL -->
    <div class="panel center">
        <h2>Result</h2>
        <div id="resultBox">Menunggu input...</div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="panel right">
        <h2>State History</h2>
        <div id="historyBox"></div>
    </div>

    </div>
</div>

<script src="P2.js"></script>
</body>
</html>
